<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h3>Rock Paper Scissors Game</h3>
    <button onclick="
    PlayGame('rock')
    ">Rock</button>

    <button onclick="
     PlayGame('paper')
      ">Paper</button>

    <button onclick="
       PlayGame('Scissors')
     ">Scissors</button>

    <p class="result"></p>
    <p class="moves"></p>
     <p class="js-score"></p>

     <button onclick="
     score.Wins = 0;
     score.Losses = 0;
     score.Ties = 0;
     localStorage.removeItem('score')
     updatescoreEle();   // here cos of to reset the score and also reset on display
     ">Reset Score</button>
</body>

<script>

     
    let  score = JSON.parse(localStorage.getItem('score')) || // for when refresh  score anot remove
    {
        Wins: 0,
        Losses: 0,
        Ties: 0
    };

    
    // if(!score){
    //     score = {
    //     Wins: 0,
    //     Losses: 0,
    //     Ties: 0
    // };
    // }


    function PlayGame(PlayerMove) {
        const computerMove = pickCompterMove();

        let result = '';
        if (PlayerMove === 'Scissors') {
            if (computerMove === 'rock') {
                result = 'You Lose.'
            } else if (computerMove === 'paper') {
                result = 'You Win.';
            } else if (computerMove === 'Scissors') {
                result = 'tie.';
            }
        } 
        else if (PlayerMove === 'paper') {
            if (computerMove === 'rock') {
                result = 'You Win.'
            } else if (computerMove === 'paper') {
                result = 'tie.';
            } else if (computerMove === 'Scissors') {
                result = 'You Lose.';
            }

        }
         else if (PlayerMove === 'rock') {
            if (computerMove === 'rock') {
                result = 'tie.'
            } else if (computerMove === 'paper') {
                result = 'You Lose.';
            } else if (computerMove === 'Scissors') {
                result = 'You Win.';
            }
        }

        if(result === 'You Win.'){
            score.Wins += 1;
        } else if (result === 'You Lose.'){
            score.Losses += 1;
        } else if(result === 'tie.'){
            score.Ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score));    // for when refresh  score anot remove 

        document.querySelector('.result').innerHTML = `${result}`
        document.querySelector('.moves').innerHTML =`You Picked ${PlayerMove}. Computer Picked ${computerMove}.`
        updatescoreEle();  //call the function of popup message display here in PlayGame function

     alert(`You Picked ${PlayerMove}. Computer Picked ${computerMove}. ${result} 
Wins: ${score.Wins}, Losses: ${score.Losses}, Ties: ${score.Ties}`);

    }

    function updatescoreEle(){          // to show popup massage on display  
        document.querySelector('.js-score')
        .innerHTML = `Wins: ${score.Wins}, Losses: ${score.Losses}, Ties: ${score.Ties}`;

    }

    let computerMove = '';

    function pickCompterMove() {
        const randomNum = Math.random();

        if (randomNum >= 0 && randomNum < 1 / 3) {
            computerMove = 'rock';
        } else if (randomNum >= 1 / 3 && randomNum < 2 / 3) {
            computerMove = 'paper';
        } else if (randomNum >= 2 / 3 && randomNum < 1) {
            computerMove = 'Scissors';
        }

        return computerMove;
    }
</script>

</html>
